name: Beta

on:
  push:
    branches:
      - develop
      - agent/debug-oidc-publish   # temp: direct branch trigger for OIDC diagnosis

jobs:
  beta:
    name: Beta Release
    runs-on: ubuntu-latest
    if: >-
      startsWith(github.event.head_commit.message, 'chore: bump version') ||
      github.ref == 'refs/heads/agent/debug-oidc-publish'

    permissions:
      contents: write
      id-token: write   # Required for npm OIDC Trusted Publishing

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '20.x'
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'

      - name: Debug — all npmrc locations and OIDC env
        run: |
          echo "====== NPM_CONFIG_USERCONFIG ======"
          echo "${NPM_CONFIG_USERCONFIG:-not set}"

          echo "====== Project .npmrc (pwd=$(pwd)) ======"
          cat .npmrc 2>/dev/null || echo "(not found)"

          echo "====== NPM_CONFIG_USERCONFIG file ======"
          cat "${NPM_CONFIG_USERCONFIG}" 2>/dev/null || echo "(file not found at NPM_CONFIG_USERCONFIG)"

          echo "====== ~/.npmrc ======"
          cat ~/.npmrc 2>/dev/null || echo "(not found)"

          echo "====== npm config get userconfig ======"
          npm config get userconfig

          echo "====== npm config ls (auth lines only) ======"
          npm config ls -l 2>/dev/null | grep -i "authToken\|token\|_auth" || echo "(none)"

          echo "====== NODE_AUTH_TOKEN ======"
          echo "Length: ${#NODE_AUTH_TOKEN}"

          echo "====== OIDC env vars ======"
          echo "ACTIONS_ID_TOKEN_REQUEST_URL: ${ACTIONS_ID_TOKEN_REQUEST_URL:+SET (${#ACTIONS_ID_TOKEN_REQUEST_URL} chars)}"
          echo "ACTIONS_ID_TOKEN_REQUEST_TOKEN: ${ACTIONS_ID_TOKEN_REQUEST_TOKEN:+SET}"

          echo "====== npm version ======"
          npm --version

      - name: Remove ALL auth tokens for OIDC
        run: |
          echo "--- Cleaning project .npmrc ---"
          if [ -f .npmrc ]; then
            echo "Before:"
            cat .npmrc
            sed -i '/authToken/d' .npmrc
            echo "After:"
            cat .npmrc
          else
            echo "(no project .npmrc)"
          fi

          echo "--- Cleaning NPM_CONFIG_USERCONFIG ---"
          if [ -n "$NPM_CONFIG_USERCONFIG" ] && [ -f "$NPM_CONFIG_USERCONFIG" ]; then
            echo "Before:"
            cat "$NPM_CONFIG_USERCONFIG"
            sed -i '/authToken/d' "$NPM_CONFIG_USERCONFIG"
            echo "After:"
            cat "$NPM_CONFIG_USERCONFIG"
          else
            echo "(NPM_CONFIG_USERCONFIG not set or file not found)"
          fi

          echo "--- Cleaning ~/.npmrc ---"
          if [ -f ~/.npmrc ]; then
            echo "Before:"
            cat ~/.npmrc
            sed -i '/authToken/d' ~/.npmrc
            echo "After:"
            cat ~/.npmrc
          else
            echo "(no ~/.npmrc)"
          fi

          echo "--- npm config delete (belt-and-suspenders) ---"
          npm config delete //registry.npmjs.org/:_authToken 2>&1 || true

          echo "--- Final check: npm config get authToken ---"
          npm config get //registry.npmjs.org/:_authToken 2>&1 || echo "(key absent)"

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Pack
        run: npm pack

      - name: Get version
        id: pkg
        run: echo "version=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT

      - name: Create beta GitHub pre-release
        if: "startsWith(github.event.head_commit.message, 'chore: bump version')"
        uses: softprops/action-gh-release@v3
        with:
          tag_name: v${{ steps.pkg.outputs.version }}-beta.${{ github.run_number }}
          name: v${{ steps.pkg.outputs.version }}-beta.${{ github.run_number }}
          files: homebridge-ups-monitor-*.tgz
          generate_release_notes: true
          prerelease: true
          make_latest: false

      - name: Publish to npm with beta tag
        run: npm publish --access public --tag beta --provenance
