name: Beta

on:
  push:
    branches:
      - develop
      - agent/debug-oidc-publish

jobs:
  beta:
    name: Beta Release
    runs-on: ubuntu-latest
    if: >-
      startsWith(github.event.head_commit.message, 'chore: bump version') ||
      github.ref == 'refs/heads/agent/debug-oidc-publish'

    permissions:
      contents: write
      id-token: write

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '20.x'
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Pack
        run: npm pack

      - name: Get version
        id: pkg
        run: echo "version=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT

      - name: Create beta GitHub pre-release
        if: "startsWith(github.event.head_commit.message, 'chore: bump version')"
        uses: softprops/action-gh-release@v3
        with:
          tag_name: v${{ steps.pkg.outputs.version }}-beta.${{ github.run_number }}
          name: v${{ steps.pkg.outputs.version }}-beta.${{ github.run_number }}
          files: homebridge-ups-monitor-*.tgz
          generate_release_notes: true
          prerelease: true
          make_latest: false

      - name: Collect publish diagnostics
        if: always()
        run: |
          mkdir -p /tmp/npm-debug

          echo "=== NPM_CONFIG_USERCONFIG ===" >> /tmp/npm-debug/config.txt
          echo "${NPM_CONFIG_USERCONFIG:-not set}" >> /tmp/npm-debug/config.txt

          echo "=== Project .npmrc ===" >> /tmp/npm-debug/config.txt
          cat .npmrc 2>/dev/null >> /tmp/npm-debug/config.txt || echo "(not found)" >> /tmp/npm-debug/config.txt

          echo "=== NPM_CONFIG_USERCONFIG file ===" >> /tmp/npm-debug/config.txt
          cat "${NPM_CONFIG_USERCONFIG}" 2>/dev/null >> /tmp/npm-debug/config.txt || echo "(not found)" >> /tmp/npm-debug/config.txt

          echo "=== npm config ls ===" >> /tmp/npm-debug/config.txt
          npm config ls 2>&1 >> /tmp/npm-debug/config.txt

          echo "=== NODE_AUTH_TOKEN length ===" >> /tmp/npm-debug/config.txt
          echo "${#NODE_AUTH_TOKEN}" >> /tmp/npm-debug/config.txt

          echo "=== OIDC env ===" >> /tmp/npm-debug/config.txt
          echo "ACTIONS_ID_TOKEN_REQUEST_URL: ${ACTIONS_ID_TOKEN_REQUEST_URL:+SET (len=${#ACTIONS_ID_TOKEN_REQUEST_URL})}" >> /tmp/npm-debug/config.txt
          echo "ACTIONS_ID_TOKEN_REQUEST_TOKEN: ${ACTIONS_ID_TOKEN_REQUEST_TOKEN:+SET}" >> /tmp/npm-debug/config.txt

          echo "=== npm version ===" >> /tmp/npm-debug/config.txt
          npm --version >> /tmp/npm-debug/config.txt

          echo "=== npm publish output ===" >> /tmp/npm-debug/publish.txt
          npm publish --access public --tag beta --provenance 2>&1 >> /tmp/npm-debug/publish.txt || true

          cat /tmp/npm-debug/config.txt
          echo "---"
          cat /tmp/npm-debug/publish.txt

      - name: Upload diagnostics artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: npm-oidc-debug
          path: /tmp/npm-debug/
          retention-days: 1
