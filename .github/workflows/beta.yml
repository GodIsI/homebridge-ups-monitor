name: Beta

on:
  push:
    branches: [ develop ]

jobs:
  beta:
    name: Beta Release
    runs-on: ubuntu-latest
    if: "startsWith(github.event.head_commit.message, 'chore: bump version')"

    permissions:
      contents: write
      id-token: write   # Required for npm OIDC Trusted Publishing

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '20.x'
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'

      - name: Debug npm auth config (before delete)
        run: |
          echo "=== NPM_CONFIG_USERCONFIG ==="
          echo "${NPM_CONFIG_USERCONFIG:-not set}"
          echo "=== Userconfig file content ==="
          USERCONFIG="${NPM_CONFIG_USERCONFIG:-$(npm config get userconfig)}"
          echo "Using: $USERCONFIG"
          cat "$USERCONFIG" 2>/dev/null || echo "(file not found)"
          echo "=== npm config get auth token ==="
          npm config get //registry.npmjs.org/:_authToken 2>&1 || echo "(error getting key)"
          echo "=== NODE_AUTH_TOKEN set? ==="
          echo "Length: ${#NODE_AUTH_TOKEN}"
          echo "=== OIDC env vars ==="
          echo "ACTIONS_ID_TOKEN_REQUEST_URL: ${ACTIONS_ID_TOKEN_REQUEST_URL:+SET (${#ACTIONS_ID_TOKEN_REQUEST_URL} chars)}"
          echo "ACTIONS_ID_TOKEN_REQUEST_TOKEN: ${ACTIONS_ID_TOKEN_REQUEST_TOKEN:+SET}"

      - name: Remove setup-node auth token (let OIDC handle auth)
        run: |
          # Attempt 1: npm config delete
          npm config delete //registry.npmjs.org/:_authToken 2>/dev/null || true
          # Attempt 2: sed directly on the file (belt-and-suspenders)
          USERCONFIG="${NPM_CONFIG_USERCONFIG:-$(npm config get userconfig)}"
          sed -i '/registry\.npmjs\.org\/:_authToken/d' "$USERCONFIG" 2>/dev/null || true
          echo "Done removing auth token"

      - name: Debug npm auth config (after delete)
        run: |
          echo "=== Userconfig file content AFTER delete ==="
          USERCONFIG="${NPM_CONFIG_USERCONFIG:-$(npm config get userconfig)}"
          cat "$USERCONFIG" 2>/dev/null || echo "(file not found)"
          echo "=== npm config get auth token AFTER delete ==="
          npm config get //registry.npmjs.org/:_authToken 2>&1 || echo "(error — key absent, good)"

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Pack
        run: npm pack

      - name: Get version
        id: pkg
        run: echo "version=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT

      - name: Create beta GitHub pre-release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: v${{ steps.pkg.outputs.version }}-beta.${{ github.run_number }}
          name: v${{ steps.pkg.outputs.version }}-beta.${{ github.run_number }}
          files: homebridge-ups-monitor-*.tgz
          generate_release_notes: true
          prerelease: true
          make_latest: false

      - name: Publish to npm with beta tag
        # npm OIDC Trusted Publishing — no NPM_TOKEN required.
        # Trusted Publisher: npmjs.com/package/homebridge-ups-monitor -> Settings
        # GitHub owner: GodIsI, repo: homebridge-ups-monitor, workflow: beta.yml
        run: npm publish --access public --tag beta --provenance
